  <!-- Critical Inline CSS for LCP -->
  <style>
    :root {
      background: #020617;
      color: white;
    }

    body {
      margin: 0;
      font-family: "Outfit", sans-serif;
      background-color: #020617;
      overflow-x: hidden;
    }

    .hero-content {
      opacity: 0;
      animation: fadeIn 0.8s ease-out forwards;
      animation-delay: 0.2s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fixed-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-gradient-grid {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, #80808008 1px, transparent 1px), linear-gradient(to bottom, #80808008 1px, transparent 1px);
      background-size: 32px 32px;
    }
  </style>
</head>
