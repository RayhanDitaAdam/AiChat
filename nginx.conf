# =============================================================================
# Nginx Configuration — AiChat Production
# =============================================================================
# Setup Instructions:
#   1. Copy to: /etc/nginx/sites-available/aichat
#   2. sudo ln -s /etc/nginx/sites-available/aichat /etc/nginx/sites-enabled/aichat
#   3. Replace YOUR_DOMAIN with your actual domain
#   4. sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# Rate limiting zone: 10 req/sec per IP (network-level protection)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=2r/s;

# Upstream Node.js backend (PM2 cluster on port 4000)
upstream aichat_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Redirect HTTP → HTTPS (uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    # ── Gzip Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static Frontend (React build) ────────────────────────────────────────
    root /var/www/aichat/frontend/dist;
    index index.html;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React SPA — serve index.html for all non-API routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Reverse Proxy ────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://aichat_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts to prevent slow-loris attacks
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── Auth endpoints: extra strict rate limit ──────────────────────────────
    location ~ ^/api/auth/(login|register|refresh) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://aichat_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static file uploads ──────────────────────────────────────────────────
    location /uploads/ {
        alias /var/www/aichat/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── WebSocket support for Socket.IO ─────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://aichat_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── Block common attack vectors ──────────────────────────────────────────
    location ~ /\. { deny all; }
    location ~ /(wp-admin|wp-login|phpmyadmin|xmlrpc) { return 444; }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/aichat_access.log;
    error_log  /var/log/nginx/aichat_error.log warn;
}

